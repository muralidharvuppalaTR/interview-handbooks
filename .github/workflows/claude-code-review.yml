name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          # Option 1: OAuth token (default — created by /install-github-app or claude login)
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Option 2: API Key only (works if ANTHROPIC_API_KEY is a direct Anthropic key)
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Option 3: API Key with custom base URL (NOT a valid action input — causes warning)
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}

          # Option 4: API Key with LiteLLM proxy using base_url input
          # NOT YET IMPLEMENTED — issue #840 still open
          # https://github.com/anthropics/claude-code-action/issues/840
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # base_url: ${{ secrets.ANTHROPIC_BASE_URL }}

          # Option 5 (active): OAuth token from claude login
          # Uses your Claude enterprise subscription directly — bypasses LiteLLM entirely
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
