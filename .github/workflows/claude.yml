name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # Option 1: OAuth token (default — created by /install-github-app or claude login)
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Option 2: API Key only (works if ANTHROPIC_API_KEY is a direct Anthropic key)
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Option 3: API Key with custom base URL (NOT a valid action input — causes warning)
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # anthropic_base_url: ${{ secrets.ANTHROPIC_BASE_URL }}

          # Option 4: API Key with LiteLLM proxy using base_url input
          # NOT YET IMPLEMENTED — issue #840 still open
          # https://github.com/anthropics/claude-code-action/issues/840
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # base_url: ${{ secrets.ANTHROPIC_BASE_URL }}

          # Option 5 (active): OAuth token from claude login
          # Uses your Claude enterprise subscription directly — bypasses LiteLLM entirely
          # Token from ~/.claude/.credentials.json > claudeAiOauth.accessToken
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read
